name: ci-nullplatform
env:
  NULLPLATFORM_API_KEY: ${{ secrets.NULLPLATFORM_API_KEY }}
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
  packages: read
jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Start Nullplatform CI
        id: setup-ci
        uses: nullplatform/github-action-setup-ci@v1
        with:
          api-key: ${{ secrets.NULLPLATFORM_API_KEY }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Install nullplatform CLI
        run: curl https://cli.nullplatform.com/install.sh | sh
      - name: Push coverage metadata
        run: |
          npx jest --passWithNoTests --coverage --coverageReporters=json-summary 2>/dev/null || true
          COVERAGE=0
          if [ -f coverage/coverage-summary.json ]; then
            RAW=$(cat coverage/coverage-summary.json | jq '.total.statements.pct')
            if [ "$RAW" != "\"Unknown\"" ] && [ "$RAW" != "null" ]; then
              COVERAGE=$RAW
            fi
          fi
          np metadata create --entity build --data '{"coverage":{"percent":'$COVERAGE'}}'
      - name: Push vulnerability metadata
        run: |
          AUDIT=$(npm audit --json 2>/dev/null || true)
          CRITICAL=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.high // 0')
          MODERATE=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.moderate // 0')
          LOW=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.low // 0')
          np metadata create --entity build --data '{"security":{"critical":'$CRITICAL',"high":'$HIGH',"moderate":'$MODERATE',"low":'$LOW'}}'
    outputs:
      application-id: ${{ steps.setup-ci.outputs.application-id }}
      application-name: ${{ steps.setup-ci.outputs.application-name }}
      build-id: ${{ steps.setup-ci.outputs.build-id }}
  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        asset: [lambda, docker-image]
    steps:
      - name: Get build parameters
        id: get-build-parameters
        uses: nullplatform/github-action-secrets-and-variables@v1
        with:
          api-key: ${{ secrets.NULLPLATFORM_API_KEY }}
          application-id: ${{ needs.prepare.outputs.application-id }}
      - name: Build asset for ${{ needs.prepare.outputs.application-name }} and asset type ${{ matrix.asset }}
        id: build-asset
        uses: nullplatform/github-action-asset-build@v1
        with:
          name: ${{ matrix.asset }}-asset
          type: ${{ matrix.asset }}
          arguments: build-${{ matrix.asset }}
      - name: Push asset for ${{ needs.prepare.outputs.application-name }} and asset type ${{ matrix.asset }}
        id: push-asset
        uses: nullplatform/github-action-asset-push@v1
        with:
          name: ${{ matrix.asset }}-asset
          build-id: ${{ needs.prepare.outputs.build-id }}
          type: ${{ matrix.asset }}
    outputs:
      build-id: ${{ needs.prepare.outputs.build-id }}
      status: ${{ contains(fromJSON('["failure", "cancelled"]'), job.status) && 'failed' || 'successful' }}
  finalize:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: End Nullplatform CI
        if: ${{ always() }}
        id: end-setup-ci
        uses: nullplatform/github-action-setup-ci@v1
        with:
          api-key: ${{ secrets.NULLPLATFORM_API_KEY }}
          build-id: ${{ needs.build.outputs.build-id }}
          status: ${{ needs.build.outputs.status }}
