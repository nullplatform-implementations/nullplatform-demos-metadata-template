name: ci-nullplatform
env:
  NULLPLATFORM_API_KEY: ${{ secrets.NULLPLATFORM_API_KEY }}
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
  packages: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install nullplatform cli
        run: curl https://cli.nullplatform.com/install.sh | sh
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Start nullplatform CI
        run: np build start
      - name: Install dependencies
        run: npm install
      - name: Push coverage metadata
        run: |
          npx jest --passWithNoTests --coverage --coverageReporters=json-summary 2>/dev/null || true
          COVERAGE=0
          STATEMENTS='{"total":0,"covered":0,"skipped":0,"percent":0}'
          LINES='{"total":0,"covered":0,"skipped":0,"percent":0}'
          FUNCTIONS='{"total":0,"covered":0,"skipped":0,"percent":0}'
          BRANCHES='{"total":0,"covered":0,"skipped":0,"percent":0}'
          if [ -f coverage/coverage-summary.json ]; then
            SUMMARY=$(cat coverage/coverage-summary.json)
            RAW=$(echo "$SUMMARY" | jq '.total.statements.pct')
            if [ "$RAW" != "\"Unknown\"" ] && [ "$RAW" != "null" ]; then
              COVERAGE=$RAW
            fi
            STATEMENTS=$(echo "$SUMMARY" | jq '.total.statements | {total:.total,covered:.covered,skipped:.skipped,percent:.pct}')
            LINES=$(echo "$SUMMARY" | jq '.total.lines | {total:.total,covered:.covered,skipped:.skipped,percent:.pct}')
            FUNCTIONS=$(echo "$SUMMARY" | jq '.total.functions | {total:.total,covered:.covered,skipped:.skipped,percent:.pct}')
            BRANCHES=$(echo "$SUMMARY" | jq '.total.branches | {total:.total,covered:.covered,skipped:.skipped,percent:.pct}')
          fi
          np metadata create --entity build --data "{\"coverage\":{\"percent\":$COVERAGE,\"statements\":$STATEMENTS,\"lines\":$LINES,\"functions\":$FUNCTIONS,\"branches\":$BRANCHES}}"
      - name: Push vulnerability metadata
        run: |
          AUDIT=$(npm audit --json 2>/dev/null || true)
          CRITICAL=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.high // 0')
          np metadata create --entity build --data '{"security":{"critical":'$CRITICAL',"high":'$HIGH'}}'
      - name: Build asset
        run: docker build -t main .
      - name: Push asset
        run: np asset push --type docker-image --source main
      - name: End nullplatform CI
        if: ${{ always() }}
        run: np build update --status ${{ contains(fromJSON('["failure", "cancelled"]'), job.status) && 'failed' || 'successful' }}
